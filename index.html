<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashIL | Live Feed</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        header { background: #ed1c24; padding: 15px; text-align: center; font-size: 24px; font-weight: 900; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #fff; }
        .stream { max-width: 600px; margin: auto; padding: 10px; }
        .post { background: #111; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #ed1c24; overflow: hidden; animation: fastIn 0.2s ease; }
        @keyframes fastIn { from { opacity: 0; } to { opacity: 1; } }
        .post img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .post-content { padding: 12px; }
        .post-title { font-size: 18px; font-weight: bold; color: #fff; text-decoration: none; line-height: 1.4; display: block; }
        .info { display: flex; justify-content: space-between; font-size: 11px; color: #ed1c24; margin-top: 8px; font-weight: bold; }
        #loader { text-align: center; padding: 40px; color: #ed1c24; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<header>FLASH-IL | דיווחים שוטפים</header>

<div class="stream" id="output">
    <div id="loader">מתחבר ללוויין...</div>
</div>

<script>
    const SOURCES = [
        'https://www.hamal.co.il/rss',
        'https://www.ynet.co.il/Integration/StoryRss2.xml',
        'https://rss.walla.co.il/feed/1',
        'https://mako.co.il/rss/news-military.xml',
        'https://www.sport5.co.il/RSSFeed.aspx',
        'https://www.calcalist.co.il/GeneralRSS/0,16335,L-8,00.xml',
        'https://www.one.co.il/cat/rss/feed.aspx'
    ];

    async function getFlash() {
        const out = document.getElementById('output');
        let reports = [];

        // משיכה מקבילית מכל המקורות בבת אחת
        await Promise.all(SOURCES.map(async (url) => {
            try {
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&v=${Date.now()}`);
                const d = await r.json();
                const xml = new DOMParser().parseFromString(d.contents, "text/xml");
                
                xml.querySelectorAll("item").forEach(el => {
                    const title = el.querySelector("title")?.textContent || "";
                    const link = el.querySelector("link")?.textContent || "";
                    const time = new Date(el.querySelector("pubDate")?.textContent || "");
                    const desc = el.querySelector("description")?.textContent || "";
                    let img = el.querySelector("enclosure")?.getAttribute("url") || "";
                    
                    if(!img) {
                        const m = desc.match(/src="([^"> ]+)"/);
                        if(m) img = m[1];
                    }

                    if(title.length > 5) reports.push({ title, link, time, img });
                });
            } catch (e) {}
        }));

        reports.sort((a, b) => b.time - a.time);

        if(reports.length > 0) {
            out.innerHTML = reports.slice(0, 70).map(r => `
                <div class="post">
                    ${r.img ? `<img src="${r.img}" loading="lazy" onclick="window.open('${r.link}')">` : ''}
                    <div class="post-content">
                        <a href="${r.link}" target="_blank" class="post-title">${r.title}</a>
                        <div class="info">
                            <span>דיווח ישיר</span>
                            <span>${r.time.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    getFlash();
    setInterval(getFlash, 30000); // רענון כל 30 שניות
</script>
</body>
</html>
