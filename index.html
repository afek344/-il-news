<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashIL | Turbo</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        header { background: #ed1c24; padding: 12px; text-align: center; font-size: 22px; font-weight: 900; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #fff; }
        .stream { max-width: 600px; margin: auto; padding: 8px; }
        .post { background: #111; border-radius: 8px; margin-bottom: 12px; border-right: 4px solid #ed1c24; overflow: hidden; display: block; text-decoration: none; color: inherit; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .post img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .post-content { padding: 10px; }
        .post-title { font-size: 17px; font-weight: bold; line-height: 1.3; }
        .info { display: flex; justify-content: space-between; font-size: 11px; color: #ed1c24; margin-top: 5px; }
        #loader { text-align: center; padding: 20px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

<header>FLASH-IL | טורבו</header>

<div class="stream" id="output">
    <div id="loader">סורק מקורות מידע...</div>
</div>

<script>
    // צמצמנו למקורות הכי מהירים ויציבים
    const FEEDS = [
        { n: 'חמ"ל', u: 'https://www.hamal.co.il/rss' },
        { n: 'N12', u: 'https://mako.co.il/rss/news-military.xml' },
        { n: 'ספורט 5', u: 'https://www.sport5.co.il/RSSFeed.aspx' },
        { n: 'Ynet', u: 'https://www.ynet.co.il/Integration/StoryRss2.xml' }
    ];

    let allReports = [];

    async function fetchSource(source) {
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(source.u)}&v=${Date.now()}`);
            const d = await r.json();
            const xml = new DOMParser().parseFromString(d.contents, "text/xml");
            
            xml.querySelectorAll("item").forEach(el => {
                const title = el.querySelector("title")?.textContent || "";
                const link = el.querySelector("link")?.textContent || "";
                const time = new Date(el.querySelector("pubDate")?.textContent || "");
                const desc = el.querySelector("description")?.textContent || "";
                let img = el.querySelector("enclosure")?.getAttribute("url") || "";
                
                if(!img) {
                    const m = desc.match(/src="([^"> ]+)"/);
                    if(m) img = m[1];
                }

                if(title.length > 5) {
                    allReports.push({ title, link, time, img, sName: source.n });
                }
            });
            render(); // מעדכן את המסך מיד כשמקור אחד מסיים
        } catch (e) {}
    }

    function render() {
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');
        if (loader) loader.remove();

        // מיון לפי זמן
        allReports.sort((a, b) => b.time - a.time);

        // מציג רק את ה-50 הכי חדשים
        out.innerHTML = allReports.slice(0, 50).map(r => `
            <a href="${r.link}" target="_blank" class="post">
                ${r.img ? `<img src="${r.img}" loading="lazy">` : ''}
                <div class="post-content">
                    <div class="post-title">${r.title}</div>
                    <div class="info">
                        <span>${r.sName}</span>
                        <span>${r.time.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                </div>
            </a>
        `).join('');
    }

    function start() {
        allReports = [];
        // מפעיל את כולם אבל לא מחכה להם (Async)
        FEEDS.forEach(s => fetchSource(s));
    }

    start();
    setInterval(start, 60000); // רענון עמוק כל דקה
</script>
</body>
</html>
