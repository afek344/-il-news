<script>
    async function fetchNews() {
        const feed = document.getElementById('feed');
        
        try {
            // אנחנו משתמשים בשירות שמביא כותרות מ-RSS של אתר חדשות (למשל מעריב או וואלה)
            const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.maariv.co.il%2FRss%2FRssFeeds0.aspx');
            const data = await response.json();
            
            feed.innerHTML = ''; // מנקה את הודעת הטעינה

            data.items.forEach(item => {
                feed.innerHTML += `
                    <div class="card" onclick="window.open('${item.link}', '_blank')">
                        <div class="title">${item.title}</div>
                        <div class="time">${new Date(item.pubDate).toLocaleTimeString('he-IL')} • חדשות בזמן אמת</div>
                    </div>
                `;
            });
        } catch (error) {
            feed.innerHTML = '<div class="card">שגיאה בטעינת החדשות. נסה שוב מאוחר יותר.</div>';
        }
    }

    fetchNews();
</script>
