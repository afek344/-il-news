<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashIL | Pro</title>
<style>
:root{--red:#ed1c24;--bg:#121212;--card:#1e1e1e;--text:#fff;}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}
header{background:var(--red);padding:15px;text-align:center;font-size:24px;font-weight:900;position:sticky;top:0;z-index:1000;}
.nav{display:flex;gap:10px;padding:10px;background:#1a1a1a;position:sticky;top:58px;overflow-x:auto;}
.nav-btn{border:none;padding:8px 18px;border-radius:20px;background:#333;color:white;cursor:pointer;font-weight:bold;}
.nav-btn.active{background:var(--red);}
.container{max-width:600px;margin:auto;padding:10px;}
.card{background:var(--card);border-radius:15px;margin-bottom:20px;overflow:hidden;border-right:6px solid var(--red);}
.card-img{width:100%;height:200px;object-fit:cover;background:#222;}
.card-content{padding:15px;}
.card-title{font-size:18px;font-weight:bold;margin-bottom:10px;cursor:pointer;}
.meta{display:flex;justify-content:space-between;font-size:12px;color:#aaa;border-top:1px solid #333;padding-top:10px;}
.source{background:#000;padding:3px 8px;border-radius:4px;font-size:11px;}
.share{background:#25D366;color:white;border:none;padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;}
#status{text-align:center;padding:40px;color:#888;}
</style>
</head>
<body>

<header>FlashIL | Pro</header>

<div class="nav">
<button class="nav-btn active" onclick="changeCategory('general',this)">חדשות 🔥</button>
<button class="nav-btn" onclick="changeCategory('business',this)">כלכלה 💰</button>
<button class="nav-btn" onclick="changeCategory('sports',this)">ספורט ⚽</button>
<button class="nav-btn" onclick="changeCategory('technology',this)">טכנולוגיה 💻</button>
</div>

<div class="container" id="feed">
<div id="status">טוען דיווחים...</div>
</div>

<script>
let currentCategory = 'general';
const apiKey = "85b26a0ac6714192a6e5815892f56105";

async function fetchNews() {
    const feed = document.getElementById("feed");
    feed.innerHTML='<div id="status">טוען דיווחים...</div>';

    try {
        const res = await fetch(`https://newsapi.org/v2/top-headlines?country=il&category=${currentCategory}&pageSize=20&apiKey=${apiKey}`);
        const data = await res.json();

        if(!data.articles || data.articles.length === 0){
            feed.innerHTML='<div id="status">אין דיווחים כרגע</div>';
            return;
        }

        feed.innerHTML = data.articles.map(a=>`
            <div class="card">
                ${a.urlToImage ? `<img src="${a.urlToImage}" class="card-img" onerror="this.src='https://via.placeholder.com/600x300?text=No+Image'">` : `<img src="https://via.placeholder.com/600x300?text=No+Image" class="card-img">`}
                <div class="card-content">
                    <div class="card-title" onclick="window.open('${a.url}','_blank')">${a.title}</div>
                    <div class="meta">
                        <div><span class="source">FlashIL</span></div>
                        <button class="share" onclick="window.open('https://wa.me/?text=${encodeURIComponent(a.title + ' ' + a.url)}')">שתף</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch(e) {
        feed.innerHTML='<div id="status">שגיאה בטעינת החדשות</div>';
        console.log(e);
    }
}

function changeCategory(cat, btn){
    currentCategory=cat;
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    fetchNews();
}

// הפעלה ראשונה
fetchNews();
</script>

</body>
</html>
