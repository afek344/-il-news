<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashIL | Pro</title>
    <style>
        :root { --red: #ed1c24; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* כותרת עליונה */
        header { background: var(--red); padding: 15px; text-align: center; font-size: 24px; font-weight: 900; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        
        /* תפריט קטגוריות */
        .nav { display: flex; overflow-x: auto; gap: 10px; padding: 10px; background: #1a1a1a; position: sticky; top: 58px; z-index: 999; border-bottom: 1px solid #333; scrollbar-width: none; }
        .nav::-webkit-scrollbar { display: none; }
        .nav-btn { border: none; padding: 8px 18px; border-radius: 20px; background: #333; color: white; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; font-size: 14px; }
        .nav-btn.active { background: var(--red); transform: scale(1.05); }
        
        /* גוף האתר */
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        /* כרטיס כתבה */
        .card { background: var(--card); border-radius: 15px; margin-bottom: 20px; overflow: hidden; border-right: 6px solid var(--red); box-shadow: 0 10px 20px rgba(0,0,0,0.4); animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-img { width: 100%; height: 230px; object-fit: cover; background: #222; display: block; }
        .card-content { padding: 18px; }
        .card-title { font-size: 20px; font-weight: bold; line-height: 1.4; margin-bottom: 12px; cursor: pointer; color: white; text-decoration: none; display: block; }
        
        /* שורת מידע תחתונה */
        .meta { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; border-top: 1px solid #333; padding-top: 12px; align-items: center; }
        .source-box { display: flex; align-items: center; gap: 8px; }
        .source-tag { background: #000; color: #fff; padding: 3px 10px; border-radius: 6px; font-weight: 900; font-size: 11px; }
        
        /* כפתור שיתוף */
        .share-btn { background: #25D366; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        
        #status { text-align: center; padding: 60px; font-size: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<header>FlashIL | מרכז העדכונים</header>

<div class="nav">
    <button class="nav-btn active" onclick="filter('חדשות', this)">חדשות 🔥</button>
    <button class="nav-btn" onclick="filter('כלכלה', this)">כלכלה 💰</button>
    <button class="nav-btn" onclick="filter('ספורט', this)">ספורט ⚽</button>
    <button class="nav-btn" onclick="filter('נדלן', this)">נדל"ן 🏠</button>
</div>

<div class="container" id="feed">
    <div id="status">טוען דיווחים מכל המקורות...</div>
</div>

<script>
    let allNews = [];
    
    // רשימת מקורות מסודרת לפי קטגוריות
    const FEEDS = [
        { name: 'חמ"ל', category: 'חדשות', url: 'https://www.hamal.co.il/rss' },
        { name: 'וואלה', category: 'חדשות', url: 'https://rss.walla.co.il/feed/1' },
        { name: 'מעריב', category: 'חדשות', url: 'https://www.maariv.co.il/Rss/RssFeeds0.aspx' },
        { name: 'כלכליסט', category: 'כלכלה', url: 'https://www.calcalist.co.il/GeneralRSS/0,16335,L-8,00.xml' },
        { name: 'וואלה ספורט', category: 'ספורט', url: 'https://rss.walla.co.il/feed/3' },
        { name: 'ספורט 5', category: 'ספורט', url: 'https://www.sport5.co.il/RSSFeed.aspx' },
        { name: 'מרכז הנדל"ן', category: 'נדלן', url: 'https://www.nadlan.org.il/feed/' }
    ];

    async function load() {
        allNews = [];
        
        for (const f of FEEDS) {
            try {
                // שימוש במזהה זמן (t) ובמפתח כדי למנוע חסימות של חמ"ל ומקורות אחרים
                const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}&api_key=oyncy7v7z8x8u8u8u8u8u8u8u8u8u8u8u8u8u8u8&count=30&t=${Date.now()}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                
                if (data.status === 'ok') {
                    data.items.forEach(i => {
                        let img = i.enclosure?.link || i.thumbnail || '';
                        
                        // חיפוש תמונה מתקדם בתוך התיאור
                        if (!img && i.description) {
                            const m = i.description.match(/src="([^"> ]+)"/);
                            if (m) img = m[1];
                        }

                        // ניקוי תגיות HTML מהכותרת
                        const cleanTitle = i.title.replace(/<\/?[^>]+(>|$)/g, "");

                        allNews.push({
                            title: cleanTitle,
                            link: i.link,
                            pubDate: i.pubDate,
                            source: f.name,
                            category: f.category,
                            image: img
                        });
                    });
                }
            } catch (e) { console.log("Error loading: " + f.name); }
        }

        // מיון לפי זמן - החדש ביותר ראשון
        allNews.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        
        // הצגה ראשונית של קטגוריית "חדשות"
        const currentActive = document.querySelector('.nav-btn.active').innerText.split(' ')[0];
        render(allNews.filter(n => n.category.includes(currentActive) || (currentActive === 'נדל"ן' && n.category === 'נדלן')));
    }

    function render(list) {
        const feed = document.getElementById('feed');
        if (list.length === 0) {
            feed.innerHTML = '<div id="status">אין כרגע דיווחים חדשים בקטגוריה זו.</div>';
            return;
        }
        
        feed.innerHTML = '';
        list.forEach(item => {
            const time = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
            
            feed.innerHTML += `
                <div class="card">
                    ${item.image ? `<img src="${item.image}" class="card-img" onerror="this.remove()">` : ''}
                    <div class="card-content">
                        <a href="${item.link}" target="_blank" class="card-title">${item.title}</a>
                        <div class="meta">
                            <div class="source-box">
                                <span class="source-tag">${item.source}</span>
                                <span>${time}</span>
                            </div>
                            <button class="share-btn" onclick="window.open('https://wa.me/?text=${encodeURIComponent(item.title + ' ' + item.link)}')">
                                שתף 🟢
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function filter(cat, btn) {
        // עדכון כפתור פעיל
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // ניקוי שם הקטגוריה מהאיימוג'י לחיפוש
        const cleanCat = cat.replace(/[^\u0590-\u05FF]/g, '').trim();
        
        // סינון והצגה
        const filtered = allNews.filter(n => n.category === cleanCat);
        render(filtered);
        
        // גלילה חלקה למעלה
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // הפעלה ראשונה
    load();
    
    // רענון אוטומטי של המאגר כל 2 דקות
    setInterval(load, 120000);
</script>

</body>
</html>
