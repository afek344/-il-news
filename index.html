<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashIL | פיד חדשות ישיר</title>
    <style>
        :root { --red: #ed1c24; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
        
        header { 
            background: var(--red); 
            padding: 15px; 
            text-align: center; 
            font-size: 26px; 
            font-weight: 900; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        .container { max-width: 650px; margin: auto; padding: 10px; }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            margin-bottom: 15px; 
            overflow: hidden; 
            border-right: 4px solid var(--red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card-img { width: 100%; height: 220px; object-fit: cover; background: #222; display: block; }
        
        .card-content { padding: 15px; }
        
        .card-title { 
            font-size: 19px; 
            font-weight: bold; 
            line-height: 1.4; 
            margin-bottom: 10px; 
            color: white; 
            text-decoration: none; 
            display: block; 
            cursor: pointer; 
        }

        .meta { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            color: #bbb; 
            border-top: 1px solid #333; 
            padding-top: 10px; 
            align-items: center; 
        }

        .source-tag { 
            background: #333; 
            color: var(--red); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 800; 
            font-size: 12px;
            text-transform: uppercase;
        }

        .share-btn { 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 6px; 
            font-size: 13px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #loading-status { text-align: center; padding: 40px; color: #666; font-size: 18px; font-weight: bold; }

        /* אנימציה חלקה לכניסת כתבות */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body>

<header>FlashIL | מבזקים בזמן אמת</header>
