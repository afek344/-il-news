<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASH-IL | 0% DELAY</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; }
        header { background: #ed1c24; padding: 15px; text-align: center; font-size: 22px; font-weight: 900; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #fff; }
        .feed { max-width: 600px; margin: auto; padding: 10px; }
        .item { background: #111; border-radius: 8px; margin-bottom: 12px; border-right: 4px solid #ed1c24; overflow: hidden; display: block; text-decoration: none; color: inherit; }
        .item img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .content { padding: 12px; }
        .title { font-size: 18px; font-weight: bold; line-height: 1.4; margin-bottom: 8px; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; color: #ed1c24; font-weight: bold; }
        #loading { text-align: center; padding: 50px; color: #ed1c24; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>FLASH-IL | מבזקים בזמן אמת</header>

<div class="feed" id="live-feed">
    <div id="loading">מבצע חיבור מהיר למקורות...</div>
</div>

<script>
    // רשימת מקורות מאוחדת - הכל נכנס לפיד אחד
    const feeds = [
        'https://www.hamal.co.il/rss',
        'https://www.ynet.co.il/Integration/StoryRss2.xml',
        'https://rss.walla.co.il/feed/1',
        'https://mako.co.il/rss/news-military.xml',
        'https://www.sport5.co.il/RSSFeed.aspx',
        'https://www.one.co.il/cat/rss/feed.aspx'
    ];

    async function fetchAll() {
        let posts = [];
        // טעינה מקבילית של כל האתרים
        await Promise.all(feeds.map(async (u) => {
            try {
                // הוספת מזהה ייחודי כדי לעקוף את הדיליי של GitHub
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}&cachebust=${Date.now()}`);
                const d = await r.json();
                const xml = new DOMParser().parseFromString(d.contents, "text/xml");
                
                xml.querySelectorAll("item").forEach(el => {
                    const title = el.querySelector("title")?.textContent || "";
                    const link = el.querySelector("link")?.textContent || "";
                    const date = new Date(el.querySelector("pubDate")?.textContent || "");
                    const desc = el.querySelector("description")?.textContent || "";
                    let img = el.querySelector("enclosure")?.getAttribute("url") || "";
                    
                    if(!img) {
                        const m = desc.match(/src="([^"> ]+)"/);
                        if(m) img = m[1];
                    }

                    if(title.length > 5) posts.push({ title, link, date, img });
                });
            } catch (e) {}
        }));

        // מיון מהיר לפי זמן
        posts.sort((a, b) => b.date - a.date);

        const container = document.getElementById('live-feed');
        if(posts.length > 0) {
            container.innerHTML = posts.slice(0, 80).map(p => `
                <a href="${p.link}" target="_blank" class="item">
                    ${p.img ? `<img src="${p.img}" loading="lazy">` : ''}
                    <div class="content">
                        <div class="title">${p.title}</div>
                        <div class="meta">
                            <span>דיווח ישיר</span>
                            <span>${p.date.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
    }

    fetchAll();
    // רענון אוטומטי כל 40 שניות
    setInterval(fetchAll, 40000);
</script>
</body>
</html>
