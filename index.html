<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashIL – by Afek</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#e30613;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

.container{
max-width:600px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:12px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:12px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.meta{
font-size:13px;
color:#666;
}

button{
position:fixed;
bottom:20px;
left:20px;
border:none;
background:black;
color:white;
padding:10px 15px;
border-radius:20px;
}

.dark{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
}

</style>
</head>

<body>

<header>
FlashIL – by Afek
</header>

<div class="container" id="news"></div>

<button onclick="toggleDark()">🌙</button>

<script>

const feeds = [

{
name:"Ynet",
url:"https://api.allorigins.win/get?url="+encodeURIComponent("https://www.ynet.co.il/Integration/StoryRss2.xml")
},

{
name:"חדשות 12",
url:"https://api.allorigins.win/get?url="+encodeURIComponent("https://www.mako.co.il/feeds/12news.xml")
}

];

async function loadNews(){

const container=document.getElementById("news");
container.innerHTML="";

for(const feed of feeds){

try{

const res=await fetch(feed.url);
const data=await res.json();

const parser=new DOMParser();
const xml=parser.parseFromString(data.contents,"text/xml");

const items=xml.querySelectorAll("item");

items.forEach(item=>{

const title=item.querySelector("title")?.textContent;
const link=item.querySelector("link")?.textContent;

let img="https://via.placeholder.com/600x200?text=FlashIL";

const media=item.querySelector("media\\:content");
if(media){
img=media.getAttribute("url");
}

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${img}">

<div class="content">

<div class="title">${title}</div>

<div class="meta">מקור: ${feed.name}</div>

</div>

`;

card.onclick=()=>window.open(link);

container.appendChild(card);

});

}catch(e){

console.log(e);

}

}

}

function toggleDark(){

document.body.classList.toggle("dark");

}

loadNews();

</script>

</body>
</html>
